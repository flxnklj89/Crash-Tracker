name: Update Market Data

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate FRED secret
        shell: bash
        run: |
          if [ -z "${{ secrets.FRED_API_KEY }}" ]; then
            echo "FRED_API_KEY secret is missing. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and push data update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: update $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}" || true
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
